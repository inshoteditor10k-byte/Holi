<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holika Dahan Shubhkamnayein</title>

<style>
body{
    margin:0;
    font-family: 'Georgia', serif;
    text-align:center;
    background: linear-gradient(to bottom, #ff9933, #b30000);
    color:white;
}

.container{
    padding:20px;
}

img{
    width:100%;
    max-width:400px;
    border-radius:10px;
    box-shadow:0 0 20px yellow;
}

h2{
    margin-top:20px;
    font-size:22px;
    text-shadow:2px 2px 5px black;
}

input{
    padding:12px;
    width:80%;
    max-width:300px;
    border-radius:8px;
    border:none;
    margin-top:20px;
    font-size:16px;
}

button{
    padding:12px 20px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:gold;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:orange;
}
.footer{
    margin-top:30px;
    font-size:14px;
}
</style>
</head>
<body>

<div class="container">

    <!-- GIF -->
    <img src="1.gif" alt="Holika Dahan">

    <!-- Greeting Text -->
    <h2 id="greetText"></h2>

    <!-- Name Input -->
    <input type="text" id="nameInput" placeholder="Apna naam likhein">

    <br>
    <button onclick="shareNow()">Share Karein</button>

    <div class="footer">
        ॐ शुभ होलिका दहन 🔥
    </div>

</div>

<script>
// URL se naam lena
const urlParams = new URLSearchParams(window.location.search);
const sender = urlParams.get('name');

const greetText = document.getElementById("greetText");

if(sender){
    greetText.innerHTML = sender + " ki taraf se aapko Holika Dahan ki hardik shubhkamnayein 🔥";
}else{
    greetText.innerHTML = "Aapko Holika Dahan ki hardik shubhkamnayein 🔥";
}

function shareNow(){
    const name = document.getElementById("nameInput").value.trim();

    if(name === ""){
        alert("Pehle apna naam likho 😊");
        return;
    }

    const shareURL = window.location.origin + window.location.pathname + "?name=" + encodeURIComponent(name);

    const shareText = name + " ki taraf se Holika Dahan ki dher sari shubhkamnayein 🔥\n\nLink par click karke apna naam likhein aur apne doston ko bheje:\n" + shareURL;

    if(navigator.share){
        navigator.share({
            title:"Holika Dahan Shubhkamnayein",
            text: shareText
        });
    }else{
        window.open("https://wa.me/?text=" + encodeURIComponent(shareText));
    }
}
</script>

</body>
</html>
