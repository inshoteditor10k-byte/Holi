    <!-- Greeting Text -->
    <h2 id="greetText"></h2>

    <!-- Name Input -->
    <input type="text" id="nameInput" placeholder="Apna naam likhein">

    <br>
    <button onclick="shareNow()">Share Karein</button>

    <div class="footer">
        ॐ शुभ होली 🔥
    </div>

</div>

<script>
// URL se naam lena
const urlParams = new URLSearchParams(window.location.search);
const sender = urlParams.get('name');

const greetText = document.getElementById("greetText");

if(sender){
    greetText.innerHTML = sender + " ki taraf se aapko Holika Dahan ki hardik shubhkamnayein 🔥";
}else{
    greetText.innerHTML = "Aapko Holika Dahan ki hardik shubhkamnayein 🔥";
}

function shareNow(){
    const name = document.getElementById("nameInput").value.trim();

    if(name === ""){
        alert("Pehle apna naam likho 😊");
        return;
    }

    const shareURL = window.location.origin + window.location.pathname + "?name=" + encodeURIComponent(name);

    const shareText = name + " ki taraf se Holi ki dher sari shubhkamnayein 🔥\n\nLink par click karke apna naam likhein aur apne doston ko bheje:\n" + shareURL;

    if(navigator.share){
        navigator.share({
            title:"Holi Shubhkamnayein",
            text: shareText
        });
    }else{
        window.open("https://wa.me/?text=" + encodeURIComponent(shareText));
    }
}
</script>
